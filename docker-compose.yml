services:
  postgres:
    image: postgres:16-alpine
    container_name: notes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: notes_password
      POSTGRES_DB: notes_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_user -d notes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: notes_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://notes_user:notes_password@postgres:5432/notes_db
      JWT_SECRET: local-docker-development-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      BCRYPT_SALT_ROUNDS: 10
      CORS_ORIGIN: "*"
      API_BASE_URL: http://localhost:5000
    ports:
      - "5000:5000"

volumes:
  postgres_data:
